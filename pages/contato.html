<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato e Reserva</title>
</head>
<body>
  <header>
    <h1>TripWay - Guia de Viagens</h1>
    <nav>
        <ul>
            <li><a href="../index.html">Home</a></li>
        </ul>
    </nav>
  </header>

  <main>
    <section>
        <h2>Contato e Reserva</h2>
        <p>Faça sua reserva</p>
    <form>
        
            <label for="nome">Nome Completo</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
        
        <br><br>
            
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

        <br><br>
        <label for="destino">Destino de interesse:</label>
        <select id="destino" name="destino" required>
          <option value="" disabled selected>Selecione um destino</option>
          <option value="maldivas">Maldivas</option>
          <option value="alpes">Alpes Suíços - Suíça</option>
          <option value="rio">Rio de Janeiro - Brasil</option>
          <option value="marrakech">Marrakech - Marrocos</option>
        </select>

        <br><br>

        <label for="data">Data de partida:</label>
        <input type="date" id="data" name="data" required>

        <br><br>

        <label for="pessoas">Quantidade de pessoas:</label>
        <select id="pessoas" name="pessoas" required>
          <option value="" disabled selected>Selecione</option>
          <option value="1">1 pessoa</option>
          <option value="2">2 pessoas</option>
          <option value="3">3 pessoas</option>
          <option value="4">4 pessoas</option>
          <option value="5">5 pessoas</option>
          <option value="6">6 ou mais pessoas</option>
        </select>

        <br><br>

        <button type="submit">Fazer Reserva</button>

    </form>

    <h2>Outras formas de contato</h2>
      <ul>
        <li>Telefone: (11) 3000-0000</li>
        <li>WhatsApp: (11) 99000-0000</li>
        <li>E-mail: contato@tripway.com.br</li>
        <li>Endereço: Av. Paulista, 1106 - São Paulo, SP</li>
        <li>Horário: Segunda a Sexta, das 9h às 18h</li>

    </section>
  </main>




</body>
</html>
